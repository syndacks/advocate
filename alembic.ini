# Alembic configuration file.
# sqlalchemy.url is intentionally left as a placeholder;
# the actual URL is injected from Settings in infra/migrations/env.py.

[alembic]
script_location = infra/migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in env.py
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
